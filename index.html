<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Booking Lapangan</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Segoe UI',sans-serif;
}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#667eea,#764ba2);
}

/* CARD */
.container{
  background:#fff;
  padding:40px 30px;
  border-radius:20px;
  text-align:center;
  width:100%;
  max-width:400px;
  box-shadow:0 20px 40px rgba(0,0,0,0.2);
  animation:fadeIn .8s ease;
}

/* TITLE */
h1{
  font-size:24px;
  margin-bottom:10px;
  color:#333;
}

.subtitle{
  font-size:13px;
  color:#888;
  margin-bottom:25px;
}

/* BUTTON */
.btn{
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  font-size:14px;
  font-weight:600;
  cursor:pointer;
  margin-top:12px;
  transition:.3s;
}

/* PRIMARY */
.btn-primary{
  background:linear-gradient(135deg,#667eea,#764ba2);
  color:#fff;
}

.btn-primary:hover{
  transform:translateY(-2px);
  box-shadow:0 10px 20px rgba(0,0,0,0.2);
}

/* SECONDARY */
.btn-outline{
  background:#fff;
  border:2px solid #667eea;
  color:#667eea;
}

.btn-outline:hover{
  background:#667eea;
  color:#fff;
}

/* ICON */
.icon{
  font-size:40px;
  margin-bottom:10px;
}

/* ANIMATION */
@keyframes fadeIn{
  from{opacity:0; transform:translateY(20px);}
  to{opacity:1; transform:translateY(0);}
}

/* FOOTER */
.footer{
  margin-top:20px;
  font-size:11px;
  color:#aaa;
}
</style>
</head>

<body>

<div class="container">

  <div class="icon">🏟️</div>

  <h1>Booking Lapangan</h1>
  <div class="subtitle">Sistem Reservasi Online Cepat & Mudah</div>

  <button onclick="go('sewa.html')" class="btn btn-primary">
    🏃 Sewa Lapangan
  </button>

  <button onclick="go('jadwal.html')" class="btn btn-outline">
    📅 Lihat Jadwal
  </button>

  <div class="footer">
    © 2026 Sistem Booking
  </div>

</div>

<script>
function go(p){
  location.href = p;
}
</script>

</body>
</html>
