<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jadwal Booking</title>

<style>
*{box-sizing:border-box;font-family:'Segoe UI',sans-serif}

body{
  margin:0;
  background:linear-gradient(135deg,#667eea,#764ba2);
  padding:20px;
}

.card{
  background:#fff;
  max-width:600px;
  margin:auto;
  padding:25px;
  border-radius:20px;
  box-shadow:0 20px 40px rgba(0,0,0,0.2);
}

h2{
  text-align:center;
  margin-bottom:15px;
}

/* FILTER */
.filter{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-bottom:15px;
}

input{
  padding:10px;
  border-radius:10px;
  border:1px solid #ddd;
  width:100%;
}

/* ITEM */
.item{
  background:#f9fafc;
  padding:12px;
  border-radius:12px;
  margin-bottom:10px;
  border-left:5px solid #667eea;
}

.badge{
  display:inline-block;
  background:#667eea;
  color:#fff;
  font-size:11px;
  padding:3px 8px;
  border-radius:8px;
  margin-bottom:5px;
}

small{color:#666}

.empty{
  text-align:center;
  color:#777;
  margin-top:20px;
}
</style>
</head>

<body>

<div class="card">

<h2>📅 Jadwal Booking</h2>

<div class="filter">
  <input id="search" placeholder="Cari nama / lapangan...">
  <input type="date" id="tanggal">
</div>

<div id="list"></div>

<button onclick="back()" style="
margin-top:10px;
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:#fff;
border:1px solid #667eea;
color:#667eea;
cursor:pointer">
← Kembali
</button>

</div>

<script>
const API="https://script.google.com/macros/s/AKfycbx24Z-3mlubF4V84Jg8eB_WYX9PysYiLne96a-MMbPhz_6ovGsney-heoibrwaovChf/exec"; // <-- GANTI

let all=[];

// LOAD DATA
async function load(){

  let r=await fetch(API,{
    method:"POST",
    body:JSON.stringify({action:"jadwal"})
  });

  let d=await r.json();

  if(d.status!=="success"){
    list.innerHTML="<div class='empty'>❌ Gagal load data</div>";
    return;
  }

  all=d.data;
  render();
}

// FORMAT TANGGAL (FIX INVALID DATE)
function formatTanggal(t){
  if(!t) return "-";

  try{
    let d=new Date(t);
    if(isNaN(d)) return "-";

    return d.toLocaleDateString("id-ID",{
      day:"2-digit",
      month:"long",
      year:"numeric"
    });
  }catch{
    return "-";
  }
}

// RENDER DATA
function render(){

  let key = search.value.toLowerCase();
  let tgl = tanggal.value;

  let html="";

  all.forEach(i=>{

    let cocok =
      (i.nama||"").toLowerCase().includes(key) ||
      (i.lapangan||"").toLowerCase().includes(key);

    // FILTER TANGGAL
    if(tgl){
      let d = i.tanggalMulai;
      if(d !== tgl) cocok=false;
    }

    if(cocok){
      html += `
      <div class="item">
        <div class="badge">${i.lapangan}</div>
        <div><b>👤 ${i.nama}</b></div>
        <small>📅 ${formatTanggal(i.tanggalMulai)} s/d ${formatTanggal(i.tanggalSelesai)}</small><br>
        <small>⏰ ${i.jamMulai} - ${i.jamSelesai}</small>
      </div>`;
    }

  });

  list.innerHTML = html || "<div class='empty'>Tidak ada data</div>";
}

// EVENT
search.oninput = render;
tanggal.onchange = render;

// BACK
function back(){
  location.href="index.html";
}

// INIT
load();
</script>

</body>
</html>
