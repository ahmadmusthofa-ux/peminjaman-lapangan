<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sewa Lapangan</title>

<style>
*{box-sizing:border-box;font-family:'Segoe UI',sans-serif;margin:0}

body{
  background:linear-gradient(135deg,#667eea,#764ba2);
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

.card{
  background:#fff;
  width:100%;
  max-width:420px;
  padding:28px;
  border-radius:20px;
  box-shadow:0 20px 40px rgba(0,0,0,.2);
}

/* TITLE */
h2{
  text-align:center;
  margin-bottom:10px;
}

.subtitle{
  text-align:center;
  font-size:12px;
  color:#777;
  margin-bottom:20px;
}

/* STEP */
.steps{
  display:flex;
  justify-content:center;
  gap:10px;
  margin-bottom:20px;
}
.step{
  width:28px;height:28px;border-radius:50%;
  background:#ddd;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;
}
.step.active{background:#667eea;color:#fff;}
.step.done{background:#22c55e;color:#fff;}

/* FORM */
.form-group{margin-bottom:14px}

label{
  display:block;
  font-size:13px;
  margin-bottom:4px;
  color:#555;
}

input,select{
  width:100%;
  padding:11px;
  border-radius:10px;
  border:1px solid #ddd;
  font-size:14px;
}

input:focus,select:focus{
  border-color:#667eea;
  outline:none;
}

.row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

/* BUTTON */
.btn{
  width:100%;
  padding:13px;
  border:none;
  border-radius:12px;
  background:linear-gradient(135deg,#667eea,#764ba2);
  color:#fff;
  font-weight:bold;
  margin-top:10px;
  cursor:pointer;
}

.btn-outline{
  background:#fff;
  border:1px solid #667eea;
  color:#667eea;
}

/* ALERT */
.alert{
  font-size:12px;
  color:red;
  margin-bottom:10px;
}

/* QRIS */
.qris{
  width:100%;
  border-radius:15px;
  margin-bottom:10px;
}

.hidden{display:none}
</style>
</head>

<body>

<div class="card">

<h2>🏟️ Booking Lapangan</h2>
<div class="subtitle">Isi data → bayar → selesai</div>

<div class="steps">
  <div id="s1" class="step active">1</div>
  <div id="s2" class="step">2</div>
</div>

<!-- STEP 1 -->
<div id="step1">

<div class="form-group">
<label>Nama</label>
<input id="nama" placeholder="Nama lengkap">
</div>

<div class="form-group">
<label>No HP</label>
<input id="nohp" placeholder="08xxxx">
</div>

<div class="row">
<div class="form-group">
<label>Tgl Mulai</label>
<input type="date" id="tanggalMulai">
</div>

<div class="form-group">
<label>Tgl Selesai</label>
<input type="date" id="tanggalSelesai">
</div>
</div>

<div id="warning" class="alert"></div>

<div class="form-group">
<label>Lapangan</label>
<select id="lapangan">
<option>Lapangan Basket</option>
<option>Lapangan Sepakbola</option>
</select>
</div>

<div class="row">
<div class="form-group">
<label>Jam Mulai</label>
<select id="jamMulai"></select>
</div>

<div class="form-group">
<label>Jam Selesai</label>
<select id="jamSelesai"></select>
</div>
</div>

<button class="btn" onclick="cek()">Cek Ketersediaan</button>

</div>

<!-- STEP 2 -->
<div id="step2" class="hidden">

<h3 style="text-align:center;margin-bottom:10px;">💳 Pembayaran QRIS</h3>

<img src="https://i.ibb.co/3WQd9rP/qris.png" class="qris">

<input type="file" id="bukti">

<button class="btn" onclick="submit()">✅ Bayar & Booking</button>
<button class="btn btn-outline" onclick="back()">← Kembali</button>

</div>

</div>

<script>
const API="https://script.google.com/macros/s/AKfycbx24Z-3mlubF4V84Jg8eB_WYX9PysYiLne96a-MMbPhz_6ovGsney-heoibrwaovChf/exec";

let data={}, fullDates=[];

function toMin(t){
  let p=t.split(":");
  return parseInt(p[0])*60 + parseInt(p[1]);
}

// LOAD TANGGAL FULL
async function loadTanggal(){
 let r=await fetch(API,{
   method:"POST",
   body:JSON.stringify({action:"tanggal"})
 });
 let d=await r.json();
 fullDates=d.data;
}

// VALIDASI RANGE
function cekTanggal(){

 if(!tanggalMulai.value || !tanggalSelesai.value) return;

 let s=new Date(tanggalMulai.value);
 let e=new Date(tanggalSelesai.value);

 if(s>e){
  warning.innerHTML="❌ Tanggal tidak valid";
  return;
 }

 let cur=new Date(s);

 while(cur<=e){
  if(fullDates.includes(cur.toDateString())){
    warning.innerHTML="❌ Ada tanggal penuh";
    tanggalMulai.value="";
    tanggalSelesai.value="";
    renderJam([]);
    return;
  }
  cur.setDate(cur.getDate()+1);
 }

 warning.innerHTML="";
 loadJam();
}

tanggalMulai.onchange=cekTanggal;
tanggalSelesai.onchange=cekTanggal;

// LOAD JAM
async function loadJam(){
 let r=await fetch(API,{
  method:"POST",
  body:JSON.stringify({
    action:"jam",
    tanggalMulai:tanggalMulai.value,
    lapangan:lapangan.value
  })
 });

 let d=await r.json();
 renderJam(d.data);
}

// RENDER JAM
function renderJam(block){
 let html="";

 for(let i=7;i<=22;i++){
  let j=(i<10?"0":"")+i+":00";
  let dis=false;

  block.forEach(b=>{
    if(toMin(j)>=toMin(b.start) && toMin(j)<toMin(b.end)){
      dis=true;
    }
  });

  html+=`<option ${dis?"disabled":""}>${j}</option>`;
 }

 jamMulai.innerHTML=html;
 jamSelesai.innerHTML=html;
}

// AMBIL DATA
function ambil(){
 return {
  nama:nama.value,
  nohp:nohp.value,
  tanggalMulai:tanggalMulai.value,
  tanggalSelesai:tanggalSelesai.value,
  jamMulai:jamMulai.value,
  jamSelesai:jamSelesai.value,
  lapangan:lapangan.value
 }
}

// CEK
async function cek(){
 data=ambil();

 if(!data.nama || !data.nohp){
  alert("Lengkapi data!");
  return;
 }

 let r=await fetch(API,{
  method:"POST",
  body:JSON.stringify({...data,action:"check"})
 });

 let d=await r.json();

 if(d.status==="available"){
  step1.classList.add("hidden");
  step2.classList.remove("hidden");

  s1.classList.remove("active");
  s1.classList.add("done");
  s2.classList.add("active");
 }else{
  alert(d.message);
 }
}

// BACK
function back(){
 step2.classList.add("hidden");
 step1.classList.remove("hidden");

 s2.classList.remove("active");
 s1.classList.add("active");
}

// SUBMIT
async function submit(){
 let file=bukti.files[0];

 if(!file){
  alert("Upload bukti dulu!");
  return;
 }

 let reader=new FileReader();

 reader.onload=async ()=>{
  data.bukti=reader.result;

  let r=await fetch(API,{
    method:"POST",
    body:JSON.stringify({...data,action:"submit"})
  });

  let d=await r.json();
  alert(d.message);
  location.reload();
 };

 reader.readAsDataURL(file);
}

// INIT
loadTanggal();
renderJam([]);
</script>

</body>
</html>
