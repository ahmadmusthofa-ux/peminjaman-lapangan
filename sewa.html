<!DOCTYPE html>
<html lang="id">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sewa Lapangan</title>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<style>
*{box-sizing:border-box;font-family:'Segoe UI',sans-serif;margin:0}

body{
  background:linear-gradient(135deg,#667eea,#764ba2);
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  padding:20px;
}

/* CARD */
.card{
  background:#fff;
  width:100%;
  max-width:420px;
  padding:25px;
  border-radius:20px;
  box-shadow:0 20px 40px rgba(0,0,0,.2);
}

/* TITLE */
h2{text-align:center;margin-bottom:5px;}
.subtitle{text-align:center;font-size:12px;color:#777;margin-bottom:20px;}

/* FORM */
.form-group{margin-bottom:14px;}
label{font-size:13px;color:#555;}
input,select,textarea{
  width:100%;
  padding:11px;
  border-radius:10px;
  border:1px solid #ddd;
  margin-top:5px;
  font-size:14px;
}
input:focus,select:focus,textarea:focus{border-color:#667eea;outline:none;}
.row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}

/* BUTTON */
.btn{
  width:100%;
  padding:13px;
  border:none;
  border-radius:12px;
  background:linear-gradient(135deg,#667eea,#764ba2);
  color:#fff;
  font-weight:bold;
  cursor:pointer;
  margin-top:10px;
}
.btn:hover{opacity:.9;}

/* LOADER */
.loader{
  border:4px solid #eee;
  border-top:4px solid #667eea;
  width:30px;height:30px;
  border-radius:50%;
  animation:spin 1s linear infinite;
  margin:10px auto;
}
@keyframes spin{100%{transform:rotate(360deg)}}

/* STEP */
.step-title{text-align:center;font-size:14px;margin-bottom:10px;color:#555;}
.qris{width:100%;border-radius:15px;margin:10px 0;}
.success{text-align:center;}
.success h3{color:#22c55e;margin-bottom:10px;}
.hidden{display:none}
</style>
</head>

<body>

<div class="card">
  <h2>🏟️ Booking Lapangan</h2>
  <div class="subtitle">Isi data → bayar → selesai</div>

  <div id="step1">
    <div class="form-group">
      <label>Nama</label>
      <input id="nama" placeholder="Masukkan nama lengkap">
    </div>

    <div class="form-group">
      <label>No HP</label>
      <input id="nohp" placeholder="08xxxx">
    </div>

    <div class="row">
      <div class="form-group">
        <label>Tgl Mulai</label>
        <input type="date" id="tanggalMulai">
      </div>
      <div class="form-group">
        <label>Tgl Selesai</label>
        <input type="date" id="tanggalSelesai">
      </div>
    </div>

    <div class="form-group">
      <label>Lapangan</label>
      <select id="lapangan">
        <option>Lapangan Basket</option>
        <option>Lapangan Sepakbola</option>
      </select>
    </div>

    <div class="row">
      <div class="form-group">
        <label>Jam Mulai</label>
        <select id="jamMulai"></select>
      </div>
      <div class="form-group">
        <label>Jam Selesai</label>
        <select id="jamSelesai"></select>
      </div>
    </div>

    <div class="form-group">
      <label>Keterangan</label>
      <textarea id="keterangan" placeholder="Contoh: Turnamen ABCD"></textarea>
    </div>

    <button class="btn" onclick="cek()">Cek Ketersediaan</button>

    <div id="loading1" class="hidden">
      <div class="loader"></div>
    </div>
  </div>

  <div id="step2" class="hidden">
    <div class="step-title">💳 Pembayaran QRIS</div>
    <img src="https://i.ibb.co.com/CKsJvZDp/QR-SEWA-LAP-BASKET-OUTDOOR-1775708794.png" class="qris">
    <div class="form-group">
      <label>Upload Bukti</label>
      <input type="file" id="bukti" accept="image/*">
    </div>
    <button class="btn" onclick="submit()">Bayar & Booking Sekarang</button>
    <div id="loading2" class="hidden">
      <div class="loader"></div>
    </div>
    <button class="btn" style="background:#eee;color:#333" onclick="back()">Kembali</button>
  </div>

  <div id="success" class="hidden success">
    <h3>✅ Booking Berhasil</h3>
    <p>Data sudah tersimpan di sistem.</p>
    <button class="btn" onclick="location.href='index.html'">Kembali ke Beranda</button>
  </div>
</div>

<script>
const API="https://script.google.com/macros/s/AKfycbx24Z-3mlubF4V84Jg8eB_WYX9PysYiLne96a-MMbPhz_6ovGsney-heoibrwaovChf/exec";

let data={};

// JAM GENERATOR
function initJam(){
  let h="";
  for(let i=7;i<=22;i++){
    let j=(i<10?"0":"")+i+":00";
    h+=`<option>${j}</option>`;
  }
  document.getElementById('jamMulai').innerHTML=h;
  document.getElementById('jamSelesai').innerHTML=h;
}

// CEK KETERSEDIAAN
async function cek(){
  // Validasi Input
  if(!nama.value || !nohp.value || !tanggalMulai.value){
    Swal.fire('Eits!', 'Isi dulu semua datanya ya!', 'warning');
    return;
  }

  data={
    nama:nama.value,
    nohp:nohp.value,
    tanggalMulai:tanggalMulai.value,
    tanggalSelesai:tanggalSelesai.value,
    jamMulai:jamMulai.value,
    jamSelesai:jamSelesai.value,
    lapangan:lapangan.value,
    keterangan:keterangan.value
  };

  loading1.classList.remove("hidden");

  try{
    let r=await fetch(API,{
      method:"POST",
      body: JSON.stringify({...data,action:"check"})
    });

    let d=await r.json();

    if(d.status=="available"){
      Swal.fire({
        icon: 'success',
        title: 'Jadwal Tersedia!',
        text: 'Silakan lanjut ke pembayaran.',
        timer: 1500,
        showConfirmButton: false
      });
      setTimeout(() => {
        step1.classList.add("hidden");
        step2.classList.remove("hidden");
      }, 1500);
    }else{
      // NOTIFIKASI BENTROK KEREN
      Swal.fire({
        icon: 'error',
        title: 'Jadwal Bentrok!',
        text: d.message || 'Maaf, waktu tersebut sudah dibooking.',
        confirmButtonColor: '#667eea'
      });
    }

  }catch(e){
    Swal.fire('Error', 'Gagal terhubung ke server', 'error');
  }
  loading1.classList.add("hidden");
}

function back(){
  step2.classList.add("hidden");
  step1.classList.remove("hidden");
}

// SUBMIT FINAL
async function submit(){
  let fileInput = document.getElementById('bukti');
  let file = fileInput.files[0];
  if(!file){
    Swal.fire('Bukti?', 'Jangan lupa upload bukti bayarnya ya!', 'question');
    return;
  }

  loading2.classList.remove("hidden");

  let reader=new FileReader();
  reader.onload=async ()=>{
    data.bukti=reader.result;

    try {
      let r=await fetch(API,{
        method:"POST",
        body: JSON.stringify({...data,action:"submit"})
      });

      let d=await r.json();

      if(d.status == "success") {
        step2.classList.add("hidden");
        success.classList.remove("hidden");
        Swal.fire('Berhasil!', 'Booking kamu sudah masuk.', 'success');
      } else {
        Swal.fire('Gagal', d.message, 'error');
      }
    } catch(e) {
      Swal.fire('Error', 'Gagal mengirim data', 'error');
    }
    loading2.classList.add("hidden");
  };
  reader.readAsDataURL(file);
}

initJam();
</script>

</body>
</html>
