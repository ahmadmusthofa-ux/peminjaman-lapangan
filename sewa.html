<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sewa Lapangan</title>

<style>
*{box-sizing:border-box;font-family:'Segoe UI',sans-serif;margin:0}

body{
  background:linear-gradient(135deg,#667eea,#764ba2);
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

.card{
  background:#fff;
  width:100%;
  max-width:420px;
  padding:28px;
  border-radius:20px;
  box-shadow:0 20px 40px rgba(0,0,0,.2);
}

h2{text-align:center;margin-bottom:10px;}
.subtitle{text-align:center;font-size:12px;color:#777;margin-bottom:20px;}

.steps{display:flex;justify-content:center;gap:10px;margin-bottom:20px;}
.step{
  width:28px;height:28px;border-radius:50%;
  background:#ddd;display:flex;align-items:center;justify-content:center;
}
.step.active{background:#667eea;color:#fff;}
.step.done{background:#22c55e;color:#fff;}

.form-group{margin-bottom:14px}
label{font-size:13px;color:#555}

input,select,textarea{
  width:100%;
  padding:11px;
  border-radius:10px;
  border:1px solid #ddd;
  margin-top:4px;
}

.row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}

.btn{
  width:100%;
  padding:13px;
  border:none;
  border-radius:12px;
  background:linear-gradient(135deg,#667eea,#764ba2);
  color:#fff;
  font-weight:bold;
  margin-top:10px;
  cursor:pointer;
}

.btn-outline{
  background:#fff;
  border:1px solid #667eea;
  color:#667eea;
}

.alert{font-size:12px;color:red;margin-bottom:10px;}

.qris{width:100%;border-radius:15px;margin-bottom:10px;}

.hidden{display:none}

/* LOADER */
.loader{
  border:4px solid #eee;
  border-top:4px solid #667eea;
  border-radius:50%;
  width:30px;height:30px;
  animation:spin 1s linear infinite;
  margin:10px auto;
}
@keyframes spin{100%{transform:rotate(360deg)}}

.success{text-align:center}
.success h3{color:#22c55e}
</style>
</head>

<body>

<div class="card">

<h2>🏟️ Booking Lapangan</h2>
<div class="subtitle">Isi data → bayar → selesai</div>

<div class="steps">
  <div id="s1" class="step active">1</div>
  <div id="s2" class="step">2</div>
</div>

<!-- STEP 1 -->
<div id="step1">

<div class="form-group">
<label>Nama</label>
<input id="nama">
</div>

<div class="form-group">
<label>No HP</label>
<input id="nohp">
</div>

<div class="row">
<div class="form-group">
<label>Tgl Mulai</label>
<input type="date" id="tanggalMulai">
</div>

<div class="form-group">
<label>Tgl Selesai</label>
<input type="date" id="tanggalSelesai">
</div>
</div>

<div id="warning" class="alert"></div>

<div class="form-group">
<label>Lapangan</label>
<select id="lapangan">
<option>Lapangan Basket</option>
<option>Lapangan Sepakbola</option>
</select>
</div>

<div class="row">
<div class="form-group">
<label>Jam Mulai</label>
<select id="jamMulai"></select>
</div>

<div class="form-group">
<label>Jam Selesai</label>
<select id="jamSelesai"></select>
</div>
</div>

<div class="form-group">
<label>Keterangan</label>
<textarea id="keterangan" placeholder="Contoh: Turnamen ABCD"></textarea>
</div>

<button class="btn" id="btnCek" onclick="cek()">Cek Ketersediaan</button>

<div id="loadingCek" class="hidden">
<div class="loader"></div>
<p style="text-align:center;font-size:12px">Mengecek...</p>
</div>

</div>

<!-- STEP 2 -->
<div id="step2" class="hidden">

<h3 style="text-align:center">💳 Pembayaran QRIS</h3>

<img src="https://i.ibb.co/3WQd9rP/qris.png" class="qris">

<input type="file" id="bukti">

<button class="btn" id="btnSubmit" onclick="submit()">Bayar & Booking</button>

<div id="loadingSubmit" class="hidden">
<div class="loader"></div>
<p style="text-align:center;font-size:12px">Menyimpan...</p>
</div>

<button class="btn btn-outline" onclick="back()">Kembali</button>

</div>

<!-- SUCCESS -->
<div id="success" class="hidden success">
<h3>✅ Booking Berhasil</h3>
<p>Data sudah tersimpan</p>
<button class="btn" onclick="location.href='index.html'">Kembali ke Beranda</button>
</div>

</div>

<script>
const API="https://script.google.com/macros/s/AKfycbx24Z-3mlubF4V84Jg8eB_WYX9PysYiLne96a-MMbPhz_6ovGsney-heoibrwaovChf/exec";

let data={};

// JAM
function renderJam(){
 let html="";
 for(let i=7;i<=22;i++){
  let j=(i<10?"0":"")+i+":00";
  html+=`<option>${j}</option>`;
 }
 jamMulai.innerHTML=html;
 jamSelesai.innerHTML=html;
}

// AMBIL DATA
function ambil(){
 return {
  nama:nama.value,
  nohp:nohp.value,
  tanggalMulai:tanggalMulai.value,
  tanggalSelesai:tanggalSelesai.value,
  jamMulai:jamMulai.value,
  jamSelesai:jamSelesai.value,
  lapangan:lapangan.value,
  keterangan:keterangan.value
 };
}

// CEK
async function cek(){

 data=ambil();

 if(!data.nama || !data.nohp){
  alert("Lengkapi data");
  return;
 }

 btnCek.style.display="none";
 loadingCek.classList.remove("hidden");

 try{
  let r=await fetch(API,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({...data,action:"check"})
  });

  let d=await r.json();

  console.log(d);

  if(d.status==="available"){
    step1.classList.add("hidden");
    step2.classList.remove("hidden");
  }else{
    alert(d.message);
  }

 }catch(e){
  alert("Server error / koneksi gagal");
 }

 btnCek.style.display="block";
 loadingCek.classList.add("hidden");
}

// BACK
function back(){
 step2.classList.add("hidden");
 step1.classList.remove("hidden");
}

// SUBMIT
async function submit(){

 let file=bukti.files[0];
 if(!file){alert("Upload bukti dulu");return;}

 btnSubmit.style.display="none";
 loadingSubmit.classList.remove("hidden");

 let reader=new FileReader();

 reader.onload=async ()=>{
  data.bukti=reader.result;

  try{
    let r=await fetch(API,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({...data,action:"submit"})
    });

    let d=await r.json();

    step2.classList.add("hidden");
    success.classList.remove("hidden");

  }catch(e){
    alert("Gagal submit");
  }

  loadingSubmit.classList.add("hidden");
 };

 reader.readAsDataURL(file);
}

renderJam();
</script>

</body>
</html>
